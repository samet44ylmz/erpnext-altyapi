apiVersion: batch/v1
kind: Job
metadata:
  name: create-erpnext-site-v5
  namespace: erpnext
spec:
  template:
    spec:
      restartPolicy: OnFailure
      # Öncü konteyner: Diskin sahipliğini frappe kullanıcısına (UID 1000) veriyor.
      initContainers:
      - name: fix-permissions
        image: frappe/erpnext:version-14
        command: ["/bin/bash", "-c", "chown -R 1000:1000 /home/frappe/frappe-bench/sites"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: sites-data
          mountPath: /home/frappe/frappe-bench/sites
      
      # Ana konteyner: Kurulumu hatasız tek satırda yapıyor.
      containers:
      - name: create-site
        image: frappe/erpnext:version-14
        command: ["bash", "-c"]
        args: 
          - "echo -e 'frappe\nerpnext' > /home/frappe/frappe-bench/sites/apps.txt && bench new-site erpnext-dev.apps.ocp.local --mariadb-root-password prime --admin-password admin123 --no-mariadb-socket && bench --site erpnext-dev.apps.ocp.local install-app erpnext"
        env:
        - name: MARIADB_HOST
          value: "mariadb"
        volumeMounts:
        - name: sites-data
          mountPath: /home/frappe/frappe-bench/sites
      volumes:
      - name: sites-data
        persistentVolumeClaim:
          claimName: erpnext-sites-pvc
