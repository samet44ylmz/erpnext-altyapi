apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext-nginx
  namespace: erpnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erpnext-nginx
  template:
    metadata:
      labels:
        app: erpnext-nginx
    spec:
      containers:
      - name: nginx
        image: {{ .Values.images.nginx }}
        ports:
        - containerPort: 8080
        env:
        - name: BACKEND
          value: "erpnext-worker:8000"
        - name: SOCKETIO
          value: "erpnext-worker:9000"
        - name: UPSTREAM_REAL_IP_ADDRESS
          value: "127.0.0.1"
        - name: FRAPPE_SITE_NAME_HEADER
          value: "$host"
        volumeMounts:
        - name: sites-storage
          mountPath: /home/frappe/frappe-bench/sites
      volumes:
      - name: sites-storage
        persistentVolumeClaim:
          claimName: erpnext-sites-pvc
