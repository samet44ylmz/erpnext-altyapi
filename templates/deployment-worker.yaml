apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext-worker
  namespace: erpnext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erpnext-worker
  template:
    metadata:
      labels:
        app: erpnext-worker
    spec:
      containers:
      - name: worker
        image: {{ .Values.images.erpnext }}
        command: ["bench"]
        args: ["worker"]
        ports:
        - containerPort: 8000
        env:
        - name: MARIADB_HOST
          value: "mariadb"
        - name: REDIS_CACHE
          value: "redis://redis:6379"
        - name: REDIS_QUEUE
          value: "redis://redis:6379"
        - name: REDIS_SOCKETIO
          value: "redis://redis:6379"
        volumeMounts:
        - name: sites-storage
          mountPath: /home/frappe/frappe-bench/sites
      volumes:
      - name: sites-storage
        persistentVolumeClaim:
          claimName: erpnext-sites-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: erpnext-worker
  namespace: erpnext
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: erpnext-worker
